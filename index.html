<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="EzyCover - 特定旅游地区保险购买平台">
    <meta name="theme-color" content="#0052CC">
    
    <title>EzyCover - 旅游保险购买平台</title>
    
    <!-- Styles -->
    <link rel="stylesheet" href="styles-v3.css">
</head>
<body>
    <div id="app">
        <!-- 🔐 管理员控制面板（仅管理员可见） -->
        <div id="admin-panel" class="admin-panel hidden">
            <div class="admin-panel-content">
                <h2>⚙️ 实验变量控制面板</h2>
                
                <!-- 响应时间控制 -->
                <div class="admin-section">
                    <h3>⏱️ 响应时间控制</h3>
                    <div class="control-group">
                        <label>响应时间（毫秒）：</label>
                        <div class="response-time-buttons">
                            <button class="response-btn active" data-time="1000">1秒</button>
                            <button class="response-btn" data-time="2000">2秒</button>
                            <button class="response-btn" data-time="3000">3秒</button>
                        </div>
                        <input type="number" id="custom-response-time" value="1000" min="0" step="100">
                        <span class="hint">或输入自定义时间（毫秒）</span>
                    </div>
                </div>
                
                <!-- 语言控制 -->
                <div class="admin-section">
                    <h3>🌐 语言控制</h3>
                    <div class="control-group">
                        <button class="language-btn active" data-language="zh">中文</button>
                        <button class="language-btn" data-language="en">English</button>
                    </div>
                </div>
                
                <!-- 关闭按钮 -->
                <button id="close-admin-panel" class="close-btn">关闭面板</button>
                
                <!-- 数据后台入口 -->
                <div class="admin-section">
                    <h3>📊 数据管理</h3>
                    <div class="control-group">
                        <button onclick="openDashboard()" style="width: 100%; background: #FF9500; margin-bottom: 10px;">打开数据后台</button>
                        <button onclick="exportDashboardData()" style="width: 100%; background: #0052CC;">导出数据</button>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 🔓 管理员登录按钮（隐藏在页面角落） -->
        <button id="admin-toggle" class="admin-toggle" title="管理员登录">⚙️</button>
        
        <!-- 语言切换按钮（右上方，用户可见） -->
        <div class="language-switcher">
            <button id="lang-zh" class="lang-btn active" data-lang="zh">中文</button>
            <button id="lang-en" class="lang-btn" data-lang="en">English</button>
        </div>
        
        <!-- Loading Animation Overlay -->
        <div id="loading-overlay">
            <div class="loading-container">
                <div class="loading-spinner"></div>
                <div class="loading-text" id="loading-text">正在加载...</div>
            </div>
        </div>
        
        <!-- Main Content Area -->
        <div id="main-content">
            <!-- Content will be rendered here by JavaScript -->
        </div>
        
        <!-- 📋 问卷调查弹窗 -->
        <div id="survey-modal" class="modal hidden">
            <div class="modal-content survey-modal-content">
                <div class="modal-header">
                    <h2 id="survey-modal-title">用户反馈问卷</h2>
                    <button class="modal-close" onclick="closeSurveyModal()">×</button>
                </div>
                <div id="survey-questions" class="survey-questions">
                    <!-- 问卷问题将在这里渲染 -->
                </div>
                <button id="survey-submit-btn" class="survey-submit-btn" onclick="submitSurvey()">提交问卷</button>
            </div>
        </div>
    </div>
    
    <!-- Configuration Files -->
    <script src="config-v3.js"></script>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    
    <!-- Data Manager -->
    <script src="data-manager.js"></script>
    
    <!-- Main Application Script -->
    <script src="script-v3-updated.js"></script>
    
    <!-- Export Data Function -->
    <script>
        // 打开数据后台
        function openDashboard() {
            window.open('admin-dashboard.html', 'dashboard', 'width=1400,height=900');
        }
        // 导出数据
        function exportDashboardData() {
            if (dataManager) {
                dataManager.exportToCSV();
            }
        }
    </script>
    <!-- 诊断工具 -->
    <script>
        console.log('=== 数据同步诊断 ===');
        console.log('1. Firebase SDK 是否加载:', typeof firebase !== 'undefined' ? '✅ 是' : '❌ 否');
        console.log('2. Firestore 是否可用:', typeof firebase !== 'undefined' && firebase.firestore ? '✅ 是' : '❌ 否');
        console.log('3. localStorage 测试:', typeof localStorage !== 'undefined' ? '✅ 是' : '❌ 否');
        console.log('4. useFirebase 状态:', typeof useFirebase !== 'undefined' ? useFirebase : '未定义');
        console.log('5. db 状态:', typeof db !== 'undefined' && db ? '✅ 已连接' : '❌ 未连接');
        
        // 测试 Firestore 连接
        if (typeof firebase !== 'undefined' && firebase.firestore) {
            try {
                firebase.initializeApp(FIREBASE_CONFIG);
                const testDb = firebase.firestore();
                testDb.collection('test').add({test: true}).then(() => {
                    console.log('6. Firestore 写入测试: ✅ 成功');
                    testDb.collection('test').get().then(() => {
                        console.log('7. Firestore 读取测试: ✅ 成功');
                    }).catch(e => console.log('7. Firestore 读取测试: ❌ 失败 -', e.message));
                }).catch(e => console.log('6. Firestore 写入测试: ❌ 失败 -', e.message));
            } catch(e) {
                console.log('Firebase 初始化失败:', e.message);
            }
        }
        console.log('=== 诊断结束 ===');
    </script>
</body>
</html>
