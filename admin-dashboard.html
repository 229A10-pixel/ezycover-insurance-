<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLT研究数据后台 - EzyCover</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', Roboto, sans-serif;
            background: #f8f9fa;
            color: #333;
        }

        .dashboard {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            background: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        .header h1 {
            color: #0052CC;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 0.9rem;
        }

        .controls {
            background: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        .control-group {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }

        .control-group label {
            font-weight: 600;
            color: #333;
        }

        .control-group select {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 0.9rem;
        }

        .control-group button {
            padding: 8px 16px;
            background: #0052CC;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .control-group button:hover {
            background: #003d99;
        }

        .control-group button.danger {
            background: #FF4444;
        }

        .control-group button.danger:hover {
            background: #DD3333;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            text-align: center;
        }

        .stat-card h3 {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 10px;
        }

        .stat-card .value {
            font-size: 2rem;
            font-weight: 700;
            color: #0052CC;
        }

        .charts {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .chart-container {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        .chart-container h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 1rem;
        }

        .data-table {
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            overflow: hidden;
        }

        .table-header {
            padding: 20px;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .table-header h3 {
            color: #333;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #f8f9fa;
            padding: 12px;
            text-align: left;
            font-weight: 600;
            color: #333;
            border-bottom: 2px solid #e0e0e0;
            font-size: 0.9rem;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #e0e0e0;
            font-size: 0.9rem;
        }

        tr:hover {
            background: #f8f9fa;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 8px;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-header h2 {
            color: #0052CC;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 28px;
            color: #999;
            cursor: pointer;
        }

        .detail-item {
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid #e0e0e0;
        }

        .detail-item:last-child {
            border-bottom: none;
        }

        .detail-label {
            font-weight: 600;
            color: #666;
            font-size: 0.9rem;
        }

        .detail-value {
            color: #333;
            margin-top: 5px;
        }

        .no-data {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .scroll-container {
            overflow-x: auto;
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <!-- 头部 -->
        <div class="header">
            <h1>📊 CLT研究数据后台</h1>
            <p>实时数据采集、分析与导出系统</p>
        </div>

        <!-- 控制面板 -->
        <div class="controls">
            <div class="control-group">
                <label>时间距离筛选：</label>
                <select id="filterTemporal">
                    <option value="">全部</option>
                    <option value="3天后（近时间距离）">近时间距离</option>
                    <option value="1个月后（远时间距离）">远时间距离</option>
                </select>

                <label>空间距离筛选：</label>
                <select id="filterSpatial">
                    <option value="">全部</option>
                    <option value="国内（近空间距离）">国内（近）</option>
                    <option value="海外（远空间距离）">海外（远）</option>
                </select>

                <label>响应时间筛选：</label>
                <select id="filterResponseTime">
                    <option value="">全部</option>
                    <option value="1000">1秒</option>
                    <option value="2000">2秒</option>
                    <option value="3000">3秒</option>
                </select>

                <button onclick="applyFilters()">应用筛选</button>
                <button onclick="resetFilters()">重置</button>
                <button onclick="manualRefresh()">🔄 手动刷新</button>
                <button onclick="exportData()">导出CSV</button>
                <button class="danger" onclick="clearData()">清空数据</button>
            </div>
            <div style="margin-top: 10px; font-size: 0.85rem; color: #666;">
                ✅ 实时同步已启用 - 数据每 500ms 自动检查一次更新
            </div>
        </div>

        <!-- 统计卡片 -->
        <div class="stats">
            <div class="stat-card">
                <h3>总记录数</h3>
                <div class="value" id="totalRecords">0</div>
            </div>
            <div class="stat-card">
                <h3>平均决策时长</h3>
                <div class="value" id="avgDecisionTime">0s</div>
            </div>
            <div class="stat-card">
                <h3>平均WTP</h3>
                <div class="value" id="avgWTP">¥0</div>
            </div>
        </div>

        <!-- 图表 -->
        <div class="charts">
            <div class="chart-container">
                <h3>保险等级选择分布</h3>
                <canvas id="insuranceChart"></canvas>
            </div>
            <div class="chart-container">
                <h3>WTP金额分布</h3>
                <canvas id="wtpChart"></canvas>
            </div>
        </div>

        <!-- 数据表格 -->
        <div class="data-table">
            <div class="table-header">
                <h3>数据列表</h3>
            </div>
            <div class="scroll-container">
                <table id="dataTable">
                    <thead>
                        <tr>
                            <th>会话ID</th>
                            <th>响应时间</th>
                            <th>时间距离</th>
                            <th>空间距离</th>
                            <th>保险选择</th>
                            <th>WTP</th>
                            <th>决策时长</th>
                            <th>提交时间</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr><td colspan="9" class="no-data">暂无数据</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- 详情弹窗 -->
    <div class="modal" id="detailModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>数据详情</h2>
                <button class="modal-close" onclick="closeDetailModal()">×</button>
            </div>
            <div id="detailContent"></div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="data-manager.js"></script>
    <script>
        let currentData = [];
        let insuranceChart = null;
        let wtpChart = null;
        let lastDataCount = 0;
        let pollInterval = null;
        let unsubscribe = null;

        // 初始化
        async function init() {
            if (typeof dataManager !== 'undefined' && dataManager.refreshCloudData) {
                await dataManager.refreshCloudData();
            }
            await loadData();
            updateStatistics();
            renderCharts();
            renderTable();
            
            // 启动实时监听
            startRealTimeListener();
            
            // 启动实时轮询（作为备用）
            startRealTimePolling();
            
            // 监听 localStorage 变化（跨标签页通信）
            window.addEventListener('storage', handleStorageChange);
        }

        // 启动 Firebase 实时监听
        function startRealTimeListener() {
            if (typeof dataManager !== 'undefined' && dataManager.listenToDataUpdates) {
                unsubscribe = dataManager.listenToDataUpdates((newData) => {
                    console.log('🔔 Firebase data updated:', newData.length, 'records');
                    currentData = newData;
                    lastDataCount = newData.length;
                    updateStatistics();
                    renderCharts();
                    renderTable();
                });
                console.log('✅ Firebase real-time listener started');
            }
        }

        // 启动实时轮询（作为 Firebase 的备用方案）
        function startRealTimePolling() {
            // 每 1000ms 检查一次新数据
            pollInterval = setInterval(async () => {
                if (typeof dataManager !== 'undefined' && dataManager.refreshCloudData) {
                    const newData = await dataManager.refreshCloudData();
                    if (newData.length !== lastDataCount) {
                        console.log('🔔 检测到新数据，更新后台显示:', newData.length, '条');
                        currentData = newData;
                        lastDataCount = newData.length;
                        updateStatistics();
                        renderCharts();
                        renderTable();
                    }
                }
            }, 1000);
        }

        // 处理 localStorage 变化
        function handleStorageChange(event) {
            if (event.key === 'clt_research_data') {
                console.log('检测到 localStorage 变化，更新后台显示');
                loadData();
                updateStatistics();
                renderCharts();
                renderTable();
            }
        }

        // 加载数据
        async function loadData() {
            if (typeof dataManager !== 'undefined' && dataManager.getAllDataAsync) {
                currentData = await dataManager.getAllDataAsync();
                lastDataCount = currentData.length;
            } else if (typeof dataManager !== 'undefined' && dataManager.getAllData) {
                currentData = dataManager.getAllData();
                lastDataCount = currentData.length;
            } else {
                currentData = JSON.parse(localStorage.getItem('clt_research_data') || '[]');
                lastDataCount = currentData.length;
            }
        }

        // 应用筛选
        async function applyFilters() {
            const filters = {
                temporal_distance: document.getElementById('filterTemporal').value,
                spatial_distance: document.getElementById('filterSpatial').value,
                responseTime: parseInt(document.getElementById('filterResponseTime').value) || null
            };

            if (typeof dataManager !== 'undefined' && dataManager.filterDataAsync) {
                currentData = await dataManager.filterDataAsync(filters);
            } else {
                currentData = dataManager.filterData(filters);
            }
            updateStatistics();
            renderCharts();
            renderTable();
        }

        // 重置筛选
        async function resetFilters() {
            document.getElementById('filterTemporal').value = '';
            document.getElementById('filterSpatial').value = '';
            document.getElementById('filterResponseTime').value = '';
            await loadData();
            updateStatistics();
            renderCharts();
            renderTable();
        }

        // 手动刷新
        async function manualRefresh() {
            console.log('手动刷新数据');
            await loadData();
            updateStatistics();
            renderCharts();
            renderTable();
            alert('数据已刷新');
        }

        // 更新统计
        async function updateStatistics() {
            let stats;
            if (typeof dataManager !== 'undefined' && dataManager.getStatisticsAsync) {
                stats = await dataManager.getStatisticsAsync();
            } else if (typeof dataManager !== 'undefined' && dataManager.getStatistics) {
                stats = dataManager.getStatistics();
            } else {
                const data = JSON.parse(localStorage.getItem('clt_research_data') || '[]');
                stats = {
                    avgDecisionTime: data.reduce((a, b) => a + (b.decisionTime || 0), 0) / data.length || 0,
                    wtpAverage: 0
                };
            }
            document.getElementById('totalRecords').textContent = currentData.length;
            document.getElementById('avgDecisionTime').textContent = (stats.avgDecisionTime || 0).toFixed(1) + 's';
            document.getElementById('avgWTP').textContent = '¥' + (stats.wtpAverage || 0).toFixed(0);
        }

        // 渲染图表
        function renderCharts() {
            renderInsuranceChart();
            renderWTPChart();
        }

        // 保险选择分布图
        function renderInsuranceChart() {
            const distribution = {};
            currentData.forEach(d => {
                distribution[d.insurance_choice] = (distribution[d.insurance_choice] || 0) + 1;
            });

            const ctx = document.getElementById('insuranceChart').getContext('2d');
            if (insuranceChart) insuranceChart.destroy();

            insuranceChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: Object.keys(distribution),
                    datasets: [{
                        label: '选择数量',
                        data: Object.values(distribution),
                        backgroundColor: '#0052CC',
                        borderColor: '#003d99',
                        borderWidth: 1
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        y: { beginAtZero: true }
                    }
                }
            });
        }

        // WTP分布图
        function renderWTPChart() {
            const wtpDistribution = {};
            currentData.forEach(d => {
                wtpDistribution[d.wtp_amount] = (wtpDistribution[d.wtp_amount] || 0) + 1;
            });

            const ctx = document.getElementById('wtpChart').getContext('2d');
            if (wtpChart) wtpChart.destroy();

            wtpChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: Object.keys(wtpDistribution),
                    datasets: [{
                        label: 'WTP分布',
                        data: Object.values(wtpDistribution),
                        borderColor: '#FF9500',
                        backgroundColor: 'rgba(255, 149, 0, 0.1)',
                        tension: 0.4,
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: { display: true }
                    },
                    scales: {
                        y: { beginAtZero: true }
                    }
                }
            });
        }

        // 渲染表格
        function renderTable() {
            const tbody = document.getElementById('tableBody');
            if (currentData.length === 0) {
                tbody.innerHTML = '<tr><td colspan="9" class="no-data">暂无数据</td></tr>';
                return;
            }

            tbody.innerHTML = currentData.map(d => `
                <tr>
                    <td>${d.sessionId.substr(0, 20)}...</td>
                    <td>${d.responseTime}ms</td>
                    <td>${d.temporal_distance || '-'}</td>
                    <td>${d.spatial_distance || '-'}</td>
                    <td>${d.insurance_choice || '-'}</td>
                    <td>${d.wtp_amount || '-'}</td>
                    <td>${(d.decisionTime || 0).toFixed(1)}s</td>
                    <td>${new Date(d.timestamp).toLocaleString()}</td>
                    <td><button onclick="showDetail('${d.sessionId}')" style="padding: 4px 8px; background: #0052CC; color: white; border: none; border-radius: 4px; cursor: pointer;">查看</button></td>
                </tr>
            `).join('');
        }

        // 显示详情
        function showDetail(sessionId) {
            const data = currentData.find(d => d.sessionId === sessionId);
            if (!data) return;

            const html = `
                <div class="detail-item">
                    <div class="detail-label">会话ID</div>
                    <div class="detail-value">${data.sessionId}</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">响应时间</div>
                    <div class="detail-value">${data.responseTime}ms</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">时间距离</div>
                    <div class="detail-value">${data.temporal_distance || '-'}</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">空间距离</div>
                    <div class="detail-value">${data.spatial_distance || '-'}</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">假设距离</div>
                    <div class="detail-value">${data.hypothetical_distance || '-'}</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">社会距离</div>
                    <div class="detail-value">${data.social_distance || '-'}</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">保险选择</div>
                    <div class="detail-value">${data.insurance_choice || '-'}</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">WTP金额</div>
                    <div class="detail-value">${data.wtp_amount || '-'}</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">价格接受度</div>
                    <div class="detail-value">${data.wtp_acceptance || '-'}</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">构念水平</div>
                    <div class="detail-value">${data.construal_level || '-'}</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">风险感知</div>
                    <div class="detail-value">${data.risk_perception || '-'}</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">年龄组</div>
                    <div class="detail-value">${data.age_group || '-'}</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">时间距离感知</div>
                    <div class="detail-value">${data.manipulation_check_temporal || '-'}</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">空间距离感知</div>
                    <div class="detail-value">${data.manipulation_check_spatial || '-'}</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">网站速度感知</div>
                    <div class="detail-value">${data.manipulation_check_speed || '-'}</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">决策时长</div>
                    <div class="detail-value">${(data.decisionTime || 0).toFixed(1)}秒</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">提交时间</div>
                    <div class="detail-value">${new Date(data.timestamp).toLocaleString()}</div>
                </div>
            `;

            document.getElementById('detailContent').innerHTML = html;
            document.getElementById('detailModal').classList.add('show');
        }

        // 关闭详情弹窗
        function closeDetailModal() {
            document.getElementById('detailModal').classList.remove('show');
        }

        // 导出数据
        async function exportData() {
            if (typeof dataManager !== 'undefined' && dataManager.exportToCSVAsync) {
                await dataManager.exportToCSVAsync();
            } else if (typeof dataManager !== 'undefined' && dataManager.exportToCSV) {
                dataManager.exportToCSV();
            } else {
                // 降级：直接从 localStorage 导出
                const data = JSON.parse(localStorage.getItem('clt_research_data') || '[]');
                dataManager.exportDataToCSV(data);
            }
        }

        // 清空数据
        async function clearData() {
            if (typeof dataManager !== 'undefined' && dataManager.clearAllData) {
                await dataManager.clearAllData();
            } else {
                if (confirm('确定要清空所有数据吗？此操作不可撤销。')) {
                    localStorage.removeItem('clt_research_data');
                    alert('数据已清空');
                }
            }
            await loadData();
            updateStatistics();
            renderCharts();
            renderTable();
        }

        // 页面加载完成后初始化
        window.addEventListener('load', init);
        
        // 页面卸载时清理
        window.addEventListener('beforeunload', () => {
            if (pollInterval) {
                clearInterval(pollInterval);
            }
            if (unsubscribe) {
                unsubscribe();
            }
        });
    </script>
</body>
</html>
